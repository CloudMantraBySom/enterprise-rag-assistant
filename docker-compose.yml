version: "3.9"
services:
  rag-api:
    build: .
    ports: ["8000:8000"]
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./vector_store:/app/vector_store

  rag-ui:
    build: .
    command: streamlit run app/streamlit_app.py --server.port=8501 --server.address=0.0.0.0
    ports: ["8501:8501"]
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./vector_store:/app/vector_store
    depends_on: [rag-api]
